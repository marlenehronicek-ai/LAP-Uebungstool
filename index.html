<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d7a2a">
  <meta name="description" content="Übungstool zur Vorbereitung auf die LAP Einzelhandel">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LAP Übung">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg">
  <title>LAP Übungstool – Einzelhandel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════ HOME ═══════════════════════ -->
  <div id="screen-home" class="screen active">
    <div class="hero">
      <span class="hero-icon">📚</span>
      <h1>LAP Übungstool</h1>
      <p class="subtitle">Vorbereitung auf die LAP Einzelhandel</p>
    </div>

    <div class="card">
      <h2>Themen auswählen</h2>
      <div class="topic-grid" id="topic-grid">
        <!-- Generiert durch app.js -->
      </div>
    </div>

    <div class="card">
      <h2>Einstellungen</h2>
      <div class="setting-row">
        <label for="num-questions">Anzahl Fragen</label>
        <select id="num-questions">
          <option value="5">5 Fragen</option>
          <option value="10" selected>10 Fragen</option>
          <option value="20">20 Fragen</option>
          <option value="all">Alle Fragen</option>
        </select>
      </div>
    </div>

    <button id="btn-start" class="btn btn-primary btn-large">Quiz starten</button>

    <div class="offline-badge" id="offline-badge" style="display:none">
      📴 Offline-Modus aktiv – alle Fragen sind verfügbar
    </div>
  </div>

  <!-- ═══════════════════════ QUIZ ═══════════════════════ -->
  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button id="btn-back" class="btn-icon" title="Abbrechen">✕</button>
      <div class="progress-info">
        <span id="q-counter">Frage 1 von 10</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="score-badge" id="score-badge">0 ✓</div>
    </header>

    <div class="question-container" id="question-container">
      <!-- Generiert durch app.js -->
    </div>
  </div>

  <!-- ═══════════════════════ RESULT ═════════════════════ -->
  <div id="screen-result" class="screen">
    <div class="result-hero">
      <span class="result-icon" id="result-icon">🎉</span>
      <h1 id="result-title">Dein Ergebnis</h1>
      <div class="result-score" id="result-score"></div>
      <p class="result-message" id="result-message"></p>
    </div>

    <div class="result-actions">
      <button id="btn-review" class="btn btn-secondary">Antworten überprüfen</button>
      <button id="btn-restart" class="btn btn-primary">Nochmal (gleiche Einstellungen)</button>
      <button id="btn-home" class="btn btn-ghost">Zur Startseite</button>
    </div>
  </div>

  <!-- ═══════════════════════ REVIEW ════════════════════ -->
  <div id="screen-review" class="screen">
    <header class="review-header">
      <button id="btn-back-review" class="btn-icon">←</button>
      <h2>Antworten überprüfen</h2>
    </header>
    <div id="review-list" class="review-list">
      <!-- Generiert durch app.js -->
    </div>
    <div class="review-footer">
      <button id="btn-back-to-result" class="btn btn-primary" style="width:100%">← Zurück zum Ergebnis</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
